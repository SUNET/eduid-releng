name: build-docker

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - '**'

jobs:
  build:
    runs-on: docker
    container: ghcr.io/catthehacker/ubuntu:act-22.04
    steps:
      - name: Checkout the repo
        uses: https://platform.sunet.se/actions/checkout@v4
      - name: Login to Container Registry
        uses: https://platform.sunet.se/actions/login-action@v3
        with:
          registry: platform.sunet.se
          username: ci-sunet-eduid
          password: ${{ secrets.CI_SUNET_EDUID }}
      - name: Build and Push
        run: make dockers dockers_tagpush REGISTRY=platform.sunet.se
